    details:
      - title: 실시간 WebSocket 대량 데이터 처리 — 포스코 MES
        tags:
          - general
          - toss
        content: |
          #### 이슈 사항

          WebSocket 기반 철판 결함 데이터 처리 과정에서 렌더링 지연 누적, 디스크 사용량 지속 증가, 공정별 판정 기준 관리 어려움이 동시에 존재

          #### 문제점

          - 렌더링 지연: WebSocket 데이터 유입 속도가 클라이언트 가공 속도를 초과
          - 디스크 증가: 중간 데이터를 모두 디스크에 저장 — 운영 기간에 비례해 사용량 증가
          - 판정 복잡성: 코일 등급 판정 기준이 공정마다 상이 — 조건 분기 복잡

          #### 개선 사항

          - 전처리 필터링 + 메모이제이션 + 배치 렌더링으로 DOM 업데이트 최소화
          - 중간 데이터를 메모리 파이프라인으로 전환 — 최종 결과만 영구 저장하여 디스크 누적 문제 해결
          - 코일 등급 판정 로직을 규칙 엔진 형태로 추상화 — 설정 파일 기반, 코드 수정 없이 대응

          #### 적용 결과

          - 데이터 유입 속도에 밀리지 않는 **실시간 처리 성능 확보**
          - 규칙 엔진으로 **신규 공정 대응 시 설정 파일만으로 대응** 가능
