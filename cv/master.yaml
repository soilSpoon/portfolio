  - slug: oss
    title: 오픈소스 기여
    dates: 2020 – 현재
    org: 개인
    tags:
      - general
      - toss
    details:
      - title: Laravel Mix 환경의 React Fast Refresh 구현
        tags:
          - general
          - toss
        content: |
          #### 이슈 사항

          출근노트 프로젝트의 Laravel Mix 빌드 환경에서 React Fast Refresh가 정상 작동하지 않아 코드 변경마다 전체 페이지가 새로고침되었습니다. 프론트엔드 개발 시 상태가 초기화되어 생산성이 크게 저하되는 문제였습니다.

          #### 문제점

          - Laravel Mix 내부의 webpack-dev-server 버전과 React Fast Refresh 플러그인 간 호환성 이슈 — HMR 설정이 추상화 레이어에 의해 제한됨
          - workaround를 적용하면 당장은 동작하지만, 라이브러리 업데이트 시 다시 깨지는 근본 해결 불가 상태

          #### 개선 사항

          라이브러리 소스 코드를 직접 분석하여 문제의 근본 원인을 파악하고, 수정사항을 제출:

          - **laravel-mix**: **webpack 내부 설정 직접 수정** — React Fast Refresh 기능 추가, webpack-dev-server 4.0 마이그레이션, HMR HTTPS 옵션 복구, BabelConfig 최적화
          - **react-refresh-webpack-plugin**: 호환성 개선
      - title: AI/LLM 도구 생태계 기여
        tags:
          - general
          - toss
        content: |
          - **CLIProxyAPI**: Gemini↔Claude API 호환 프록시 — 클라이언트 취소 시 에러 핸들링 개선, Gemini 비호환 필드 제거, Claude 모델 호환성 개선, JSON 스키마 호환성 개선
          - **Rivet sandbox-agent**: 코딩 에이전트 샌드박스 스키마 확장
          - **Block/Goose**(AI 에이전트): 로컬 추론 의존성 feature-gate 분리
      - title: 프론트엔드 핵심 인프라 기여
        tags:
          - general
          - toss
        content: |
          - **SWC**: CI GitHub Actions Node 버전 업데이트
          - **Jotai**, **Valtio**: 브랜치명 master→main 전환 등 프로젝트 표준화 기여
          - **Astro**: Vercel 어댑터에 정적 에셋 캐시 헤더 추가 — CDN 캐싱 성능 개선
          - **Snowpack**: React Fast Refresh 최소 버전 요구사항 업데이트
          - **Tremor**: 차트 컴포넌트에 null 값 구간 연결 옵션 추가
          - **twin.macro**: Tailwind transform 유틸리티 지원 추가
          - **vite-plugin-checker**: 소켓 URL 해석 로직 수정
          - **webpack/less-loader**: Less 4.0 peerDependency 추가
          - 기타: laravel/framework, aleph.js, pest, tighten/collect, NextAuth 등
      - title: 한국어 오픈소스 기여
        tags:
          - general
        content: |
          - **Rust 프로그래밍 언어 한국어 번역**: 오타 수정, 원본 레포 동기화, 코드 리스팅 추가
          - **NAVER FE News**: FE 기술 뉴스레터 오타 수정
          - **Laravel 한국어 매뉴얼**: 공식 문서 한국어 번역 기여
      - title: 오픈소스 기여 종합 결과
        tags:
          - general
          - toss
        content: |
          - 자체 프로젝트의 **React Fast Refresh 정상화** — 코드 변경 시 상태를 유지한 채 컴포넌트만 교체되어 개발 생산성 향상
          - laravel-mix 사용자 전체에 React Fast Refresh 기능 제공
          - 프론트엔드 빌드 도구와 상태관리 라이브러리의 **내부 동작 원리에 대한 깊은 이해** 확보
