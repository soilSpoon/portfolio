    details:
      - title: React 디자인 시스템 구축 — 53개 공통 컴포넌트로 개발 시간 50% 단축
        tags:
          - general
          - toss
        content: |
          #### 이슈 사항

          4년간 기능 위주 개발로 유사한 UI 패턴이 페이지마다 중복 구현. 동일 기능의 테이블이 각기 다른 방식으로 존재하고 상태관리 패턴(useState, Context API, 전역 변수) 혼재

          #### 의사 결정

          - jQuery 기반 → React 도입 직접 건의
          - 상태관리 3계층 선택:
            - React Query (서버 상태) vs SWR → React Query 선택 (mutation + cache invalidation 우위)
            - 전역 상태: Redux vs Zustand → Zustand 선택 (보일러플레이트 최소)
            - 로컬 상태: useState vs Jotai → Jotai 선택 (atom 기반 세밀한 리렌더링 제어)
          - Chakra UI 선택 이유: WAI-ARIA 접근성 내장, 커스텀 토큰 시스템

          #### 개선 사항

          - Chakra UI 기반 디자인 시스템 도입, 프로젝트 전용 53개 공통 컴포넌트 추출·표준화
          - WAI-ARIA 접근성 지원으로 키보드 내비게이션, 스크린리더 호환, 포커스 관리를 표준화
          - 상태관리 계층 분리: React Query(서버), Zustand(전역 UI), Jotai(로컬), Zod(런타임 검증)

          #### 적용 결과

          - 공통 컴포넌트 조합만으로 신규 페이지 구성 — 개발 시간 **50% 단축**
          - 이 아키텍처 위에 노무법인 시스템 **6개 모듈** 안정적 신규 개발 완료
          - 상태관리 계층 분리로 불필요한 리렌더링 제거
          - WAI-ARIA 기반 접근성 적용으로 키보드만으로 주요 업무 수행 가능
      - title: 대량 데이터 렌더링 최적화 — UI 프리징 완전 해소
        tags:
          - general
          - toss
        content: |
          #### 이슈 사항

          수천 명 규모 사업장 유입 후 급여 정산 화면에서 테이블 렌더링 시 UI가 수 초간 프리징. "화면이 멈췄다"는 CS 반복 접수

          #### 문제점

          - 프론트엔드: 전체 행을 한 번에 렌더링하는 구조에 가상화 미적용
          - 백엔드: N+1 쿼리로 응답 지연
          - 프론트·백엔드 양쪽의 병목이 겹쳐 체감 지연 가중

          #### 개선 사항

          - react-window 기반 가상화 → 화면에 보이는 행만 렌더링
          - React.memo + useMemo → 행 단위 메모이제이션, React Query staleTime/cacheTime 조정으로 중복 API 호출 제거
          - Redis 캐싱 도입 + N+1 쿼리 해소 + Eager Loading 전환
          - 20명 이하 소규모 사업장은 캐시 바이패스 로직 추가

          #### 적용 결과

          - 수천 명 급여 정산 화면에서 **UI 프리징 완전 해소**
          - 정산 기간 중 관련 **CS 문의 해소**
      - title: B2B2C 5단계 권한 체계 설계 — 노무법인 6개 모듈 신규 개발
        tags:
          - general
          - toss
        content: |
          #### 이슈 사항

          어드민→노무법인→사업주→중간관리자→근로자 5단계 권한이 존재하나, 권한 분기 로직이 컴포넌트 곳곳에 산재. 신규 권한 레벨 추가 시 기존 전체 페이지 검토 필요

          #### 개선 사항

          - PermissionGate 컴포넌트 + usePermission 훅으로 선언적 권한 기반 렌더링 구현
          - 라우트 레벨 권한 가드 미들웨어 적용 — 접근 불가 페이지는 자동 리디렉션
          - 백엔드 Policy/Gate 패턴과 연동하여 API 레벨 이중 권한 검증
          - 이 아키텍처 위에 노무법인 시스템 전체 신규 개발: 대시보드, 부관리자 관리, 기본정보 관리, 계정 찾기, 근로자 정보 관리, 사업장 검색

          #### 적용 결과

          - 권한 로직 **중앙 집중화**로 노무법인 전체 시스템(6개 모듈) 안정적 추가 완료
          - 신규 권한 레벨 추가 시 설정만 변경 — **영향 범위 최소화**
          - API + 프론트 이중 검증으로 데이터 접근 보안 확보
      - title: jQuery/PHP 5 → React/Laravel 전환 — 기술 스택 선정부터 마이그레이션
        tags:
          - general
        content: |
          #### 이슈 사항

          입사 당시 기술 스택은 jQuery + 바닐라 PHP 5(프레임워크 미사용)

          #### 문제점

          - MVC 패턴 없이 비즈니스 로직과 뷰 렌더링이 한 파일에 혼재
          - PHP 5 보안 업데이트 종료로 취약점 노출 위험

          #### 의사 결정

          - 지속적 건의를 통해 React + Laravel 도입을 관철

          #### 개선 사항

          - 프론트엔드를 React로 전면 전환하여 컴포넌트 기반 UI 개발 체계 구축
          - 백엔드를 Laravel로 마이그레이션하여 MVC, ORM, 라우팅 등 체계적 환경 확보
          - PHP 7.x → 8.x 단계적 업그레이드

          #### 적용 결과

          - 컴포넌트 재사용과 상태 관리 도입으로 **프론트엔드 DX 대폭 향상**
          - 이 전환을 기반으로 디자인 시스템, 성능 최적화, 권한 체계 등 이후 모든 개선 진행
      - title: CI/CD 최적화 — Self-hosted → ARC 전환, 3단계 병렬화
        tags:
          - general
        content: |
          #### 이슈 사항

          프로젝트 규모 증가로 CI 실행 시간 지속 증가

          #### 문제점

          - GitHub-hosted runner 성능 제한으로 매 실행마다 전체 의존성 재다운로드 발생
          - 프론트·백엔드 lint와 빌드가 직렬로 실행되는 구조

          #### 개선 사항

          - Self-hosted runner 도입 → ARC(Actions Runner Controller) 업그레이드로 Kubernetes 기반 러너 관리
          - CI를 Frontend·Backend lint·정적 분석 3단계 병렬 실행 구조로 재설계, 동일 브랜치 중복 실행 방지
          - Husky + lint-staged 도입으로 커밋 전 파일 타입별 자동 검사
          - Node.js 20 업그레이드로 빌드 성능 향상

          #### 적용 결과

          - ARC 전환 + 3단계 병렬 실행으로 **CI 대기 시간 단축**
          - 커밋 전 자동 검사로 스타일·타입 오류가 **로컬에서 사전 차단**
      - title: React Native + WebView 하이브리드 모바일 앱 — 3개 플랫폼 서비스
        tags:
          - general
        content: |
          #### 이슈 사항

          모바일 사용자 비율 증가로 앱 제공이 필요했으나, iOS/Android 간 WebView 동작(쿠키/세션, JavaScript 브릿지, 스크롤)이 상이하여 통합이 어려운 상태

          #### 개선 사항

          - React Native + WebView 하이브리드 구조로 기존 웹 코드 최대한 재활용
          - Platform.OS 기반 추상화 레이어로 플랫폼별 분기 격리 — 비즈니스 로직 공유, 네이티브 연동부만 분리
          - iOS/Android 각각의 WebView 특성에 맞춘 세션 관리, 쿠키 동기화 적용

          #### 적용 결과

          - 단일 코드베이스로 웹 + Android + iOS **3개 플랫폼 서비스**
          - Android/iOS 스토어 배포 및 운영 완료
      - title: React 도입 건의 및 기술 스택 선정
        tags:
          - toss
        content: |
          #### 이슈 사항

          입사 당시 기존 프로젝트들이 jQuery 기반. 출근노트는 신규 프로젝트로 기술 스택 직접 선정 기회

          #### 의사 결정

          - 기존 jQuery 프로젝트에서 DOM 직접 조작으로 인한 상태 불일치, UI 재사용 불가 한계를 경험 → React 도입 건의

          #### 개선 사항

          - 신규 프로젝트에 React 도입을 건의하고, 처음부터 컴포넌트 기반 UI 개발 체계로 시작
          - 이후 프로젝트 성장에 맞춰 Emotion → Chakra UI → Jotai/Zustand/React Query 등 단계적 확장

          #### 적용 결과

          - 컴포넌트 재사용과 상태 관리를 처음부터 적용하여 **4년간 안정적으로 확장 가능한 프론트엔드 기반** 확보
          - 이 아키텍처를 기반으로 디자인 시스템, 성능 최적화, 권한 체계 등 모든 개선 진행
