        content: |
          #### 이슈 사항

          SNMP, ICMP, SSH 등 서로 다른 프로토콜로 하드웨어 상태를 수집해야 했으나, 프로토콜별 수집 로직이 분산되어 있었음. 고객사마다 대시보드·알림 조건이 달라 커스터마이징 시 코드 수정·배포가 필요했음.

          #### 개선 사항

          - SNMP·ICMP·SSH 각 수집기를 공통 인터페이스로 추상화하여 플러그인 구조 설계 — 새 프로토콜은 인터페이스 구현만으로 추가 가능
          - 고객사별 대시보드 레이아웃과 알림 규칙을 설정 파일로 분리

          #### 적용 결과

          - 신규 프로토콜 추가 시 **플러그인 구현만으로 대응**
          - 고객사 커스터마이징을 **설정 파일 수정만으로 처리** — 배포 없이 현장 대응 가능
