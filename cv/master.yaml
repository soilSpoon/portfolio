    details:
      - title: OpenCASCADE WASM 브라우저 이식 — 설치 과정 제거
        tags:
          - general
          - toss
        content: |
          #### 이슈 사항

          3D CAD 엔진(OpenCASCADE)을 브라우저에서 실행해야 했으나, 기존 빌드로는 프론트엔드 통합이 어려운 상태

          #### 문제점

          - 기존 Emscripten 3.x 빌드의 32비트 메모리 제한으로 대형 CAD 모델 처리 불가
          - TypeScript 타입 정의 부재로 프론트엔드에서 WASM 모듈 호출 시 타입 안전성 없음

          #### 의사 결정

          - Emscripten 업그레이드 전략: 3→5 일괄 vs 3→4→5 단계적 → 단계적 접근 선택 (버전 간 breaking change가 많아 일괄 업그레이드 시 디버깅 불가)
          - SSR 호환: dynamic import + Suspense 조합으로 Next.js hydration 경고 제거

          #### 개선 사항

          - C++ 3D CAD 엔진을 WASM 컴파일하여 브라우저 실행 환경 구축
          - 64비트 메모리 지원 활성화로 대형 CAD 모델 처리 가능
          - d.ts 자동 생성 파이프라인 구축 → 프론트엔드-WASM 간 타입 안전 인터페이스 확보
          - CMake 빌드 체계를 Emscripten 타겟으로 재구성하고, Next.js SSR 호환성 확보

          #### 적용 결과

          - 데스크탑 설치 없이 브라우저에서 3D CAD 모델링 가능 — **사용자 진입 장벽 완전 제거**
          - 64비트 지원으로 대형 모델 처리 시 메모리 제한 해소
      - title: AI 챗봇으로 시뮬레이션 워크플로우 단순화
        tags:
          - general
          - toss
        content: |
          #### 이슈 사항

          5단계 시뮬레이션 파이프라인(유체 영역→경계 조건→메시→실행→결과)에 CAE 도메인 지식이 필요하여 비전문가의 독립 사용이 어려운 상태

          #### 문제점

          - 각 단계에 CAE 전문 용어와 설정 지식이 필요 — 비전문가가 독립적으로 사용 불가
          - 단계 간 상태 의존성이 복잡하여 사용자가 인지하지 못하는 무효화 문제 발생

          #### 개선 사항

          - AI SDK v5 기반 챗봇 프론트엔드 구축 — 스트리밍 응답, 도구 실행 상태, 대화 히스토리
          - 클라이언트 사이드 도구 실행 구조 설계 — 챗봇에서 메시 실행·시뮬레이션 직접 제어
          - YAML 기반 프롬프트 관리 + 의도 분류 UI 구현

          #### 적용 결과

          - 비전문가도 자연어로 시뮬레이션 파이프라인 조작 가능 — **사용 진입 장벽 대폭 감소**
          - 모듈러 도구 아키텍처로 신규 기능 추가 시 도구 구현만으로 챗봇 자동 활용
      - title: C++ 메시 엔진 리팩토링 — Policy-based design으로 CAD 형식 확장성 확보
        tags:
          - general
        content: |
          #### 이슈 사항

          메시 생성 엔진이 단일 파일 모놀리식 C++ 코드로 구성된 상태. STEP/BREP과 STL 형식 처리가 분산되어 새 형식 추가 시 전체 코드 수정이 필요한 구조

          #### 개선 사항

          - 모놀리식 구조를 역할별 모듈(메시 생성, 파이프라인, CAD 로딩, 유체 영역)로 분해
          - Policy-based design 패턴 도입으로 파라메트릭/이산 형상 통합 처리 — 새 CAD 형식은 정책 구현만으로 추가 가능
          - C++ 매크로를 타입 안전한 상수로 전환, clang-tidy 기반 정적 분석 파이프라인 구축

          #### 적용 결과

          - 모듈 단위 독립 빌드·테스트 가능 — **기능 추가 시 영향 범위 최소화**
          - 신규 CAD 형식 지원 시 기존 코드 변경 없이 정책만 추가
      - title: PostHog 제품 분석 체계 구축 — 데이터 기반 의사결정
        tags:
          - general
          - toss
        content: |
          #### 이슈 사항

          기능 우선순위, 다국어 대응 시기 등 제품 방향성 결정이 감에 의존하는 상태

          #### 문제점

          - 사용자 행동 데이터가 전혀 없음 — 클라이언트·서버 양쪽 모두 이벤트 추적 부재
          - 사용자 이탈 단계나 전체 여정 파악 불가

          #### 개선 사항

          - PostHog 분석 파이프라인을 처음부터 구축: 클라이언트 초기화 → 사용자 식별 → 서버 사이드 이벤트 추적
          - Slack 웹훅 알림을 PostHog 서버 사이드 이벤트로 전환 — 핵심 이벤트를 통합 대시보드에서 분석
          - 클라이언트 IP 추적으로 지역별·언어별 사용 패턴 분석 기능 추가

          #### 적용 결과

          - 사용자 이탈 단계를 정량적으로 파악 — **데이터 기반 제품 방향성 결정 체계 확립**
          - 국가·언어별 유입 패턴 파악으로 다국어 대응 및 타겟 시장 우선순위 도출
      - title: 프로토타입 → 상용 아키텍처 재설계 — WASM-JS 분리 + 디자인 시스템 표준화
        tags:
          - general
          - toss
        content: |
          #### 이슈 사항

          프로토타입 수준의 코드베이스를 상용 제품으로 전환해야 하는 상태

          #### 문제점

          - 시뮬레이션 워크플로우 각 단계가 WASM 모듈 내부 상태에 직접 의존 — 독립 실행·테스트 불가
          - UI 일관성 부재와 인증 시스템 미비로 제품 완성도 부족

          #### 개선 사항

          - 시뮬레이션 워크플로우를 WASM 모듈과 분리된 상태 관리 계층으로 재설계 — 각 단계 독립 실행·테스트 가능하도록 의존성 역전
          - JavaScript↔WASM 간 명확한 인터페이스 계층 도입으로 결합도 감소
          - 통합 컬러 팔레트 시스템 + shadcn 컴포넌트 재구성으로 디자인 시스템 표준화
          - Storybook 통합으로 컴포넌트 단위 개발·문서화·인터랙션 테스트 환경 구축
          - NextAuth 인증, Devcontainer, nginx 보안 헤더, GitHub Actions 등 인프라 정비

          #### 적용 결과

          - WASM-JS 분리로 워크플로우 단계 간 **독립적 개발·테스트 가능**
          - 디자인 시스템 표준화로 **UI 일관성 확보 및 신규 화면 개발 속도 향상**
          - 안정적인 인증·인프라 체계 위에서 v1.0 릴리즈 완료
