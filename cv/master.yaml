    details:
      - title: jQuery/PHP 레거시에서 React/Laravel 도입 주도
        tags:
          - general
        content: |
          #### 이슈 사항

          입사 당시 회사의 기술 스택은 jQuery와 프레임워크 없는 바닐라 PHP 5였습니다. 모던 PHP(7.x 이상)도 아닌 레거시 환경에서, 코드의 구조화가 부족하고 프론트엔드와 백엔드의 경계가 모호한 상태로 유지보수와 기능 추가에 큰 비용이 발생하고 있었습니다.

          #### 문제점

          - jQuery 기반 DOM 직접 조작으로 UI 상태 관리가 불가능 — 복잡한 화면에서 버그가 빈번히 발생
          - 프레임워크 없는 바닐라 PHP 5로 MVC 패턴이 없어 비즈니스 로직, 데이터 접근, 뷰 렌더링이 한 파일에 혼재
          - PHP 5의 보안 업데이트 종료로 보안 취약점 노출 위험

          #### 개선 사항

          - 지속적 건의를 통해 **React + Laravel** 도입을 관철하고, 전환 계획을 수립·실행
          - 프론트엔드를 React로 전면 전환하여 컴포넌트 기반 UI 개발 체계 구축
          - 백엔드를 Laravel로 마이그레이션하여 MVC 아키텍처, ORM(Eloquent), 라우팅 등 체계적 개발 환경 확보
          - PHP 버전을 7.x → 8.x로 단계적 업그레이드

          #### 적용 결과

          - 컴포넌트 재사용과 상태 관리 도입으로 **프론트엔드 개발 속도 및 DX 대폭 향상**
          - Laravel의 체계적 구조로 백엔드 유지보수성 개선
          - 최신 PHP 버전 적용으로 보안 취약점 해소 및 성능 향상
      - title: 대량 급여 정산 화면의 프론트엔드 성능 최적화
        tags:
          - general
          - toss
        content: |
          #### 이슈 사항

          초기 개발 시 소규모 사업장(수십 명)을 기준으로 설계되어, 서비스 성장 후 수천 명 규모의 사업장이 유입되면서 성능 문제가 발생했습니다. 급여 정산 기간에 수천 명의 근로자 데이터를 한 화면에서 조회·계산·수정해야 했으나, 대량 데이터를 고려하지 않은 설계로 테이블 렌더링 시 **UI가 수 초간 프리징**되어 사용자가 "화면이 멈췄다"는 CS를 반복 접수했습니다.

          #### 문제점

          - 전체 근로자 데이터를 한 번에 DOM에 렌더링하여 DOM 노드 수천 개 생성 → 브라우저 메인 스레드 블로킹
          - 급여 계산 중 부모 컴포넌트 상태 변경이 전체 테이블 행의 불필요한 리렌더링을 유발
          - 백엔드에서도 N+1 쿼리로 인해 API 응답 자체가 느렸음 — 근태 계산 로직이 복잡하고 동일 계산이 여러 API에서 중복 호출

          #### 개선 사항

          - **프론트엔드**: react-window 기반 가상화 테이블로 화면에 보이는 행만 렌더링. React.memo로 행 컴포넌트를 메모이제이션하고, useMemo로 계산 결과 캐싱. React Query의 staleTime/cacheTime을 조정하여 동일 데이터의 중복 API 호출 제거
          - **백엔드**: Redis 캐싱을 도입하여 반복 계산 결과 저장. N+1 문제를 해결하고 Eager Loading으로 전환. 20명 이하 소규모 사업장에서는 캐싱 오버헤드가 더 크므로 캐시 바이패스 로직 추가
          - 근태 시간 관련 스키마를 리팩토링하여 쿼리 구조 단순화

          #### 적용 결과

          - 정산 페이지 **UI 프리징 현상 완전 해소** — 수천 행 데이터에서도 부드러운 스크롤
          - N+1 해소 + Redis 캐싱으로 API 응답 속도 개선, 정산 기간 중 관련 **CS 문의 해소**
          - 소규모 사업장에서 불필요한 캐시 연산을 건너뛰어 오히려 성능 향상
      - title: React 디자인 시스템 및 컴포넌트 아키텍처 구축
        tags:
          - general
          - toss
        content: |
          #### 이슈 사항

          초기 개발 시 디자인 시스템이나 컴포넌트 공통화를 고려하지 않고 기능 위주로 개발이 진행되었습니다. 4년 이상 운영되면서 유사한 UI 패턴이 각 페이지마다 독립적으로 구현되어 있었고, 동일한 기능의 테이블이 여러 파일에 각기 다른 방식으로 존재했습니다.

          #### 문제점

          - 복사-붙여넣기 방식의 UI 구현으로 페이지별 디자인 불일치 발생
          - 하나의 버그 수정이 동일 패턴이 사용된 모든 파일에 수동으로 동일 수정을 요구
          - 상태관리 패턴이 통일되지 않아 — useState, Context API, 전역 변수가 혼재

          #### 개선 사항

          - **Chakra UI** 기반 디자인 시스템을 도입하고, 프로젝트 전용 공통 컴포넌트 라이브러리를 추출 및 표준화
          - Chakra UI의 **WAI-ARIA 접근성** 지원을 활용하여 키보드 내비게이션, 스크린리더 호환, 포커스 관리를 공통 컴포넌트에 표준화
          - 상태관리 계층을 명확히 분리:
            - **React Query** — 서버 상태 (API 캐싱, 갱신, 무효화)
            - **Zustand** — 전역 UI 상태 (사이드바, 모달, 알림)
            - **Jotai** — 컴포넌트 로컬 상태 (폼 단계, 필터 조건)
            - **Zod** — 런타임 데이터 유효성 검증

          #### 적용 결과

          - 공통 컴포넌트 조합만으로 신규 페이지 구성 가능 — **개발 시간 체감 50% 단축**
          - 이 아키텍처 위에 노무법인 시스템 6개 모듈을 안정적으로 신규 개발 완료
          - 상태관리 계층 분리로 불필요한 리렌더링 제거, 코드 리뷰 시 상태 흐름 파악 용이
          - WAI-ARIA 기반 접근성 적용으로 키보드만으로 주요 업무 수행 가능
      - title: B2B2C 5단계 권한 체계의 프론트엔드 구현
        tags:
          - general
          - toss
        content: |
          #### 이슈 사항

          출근노트는 B2B2C 구조로, **어드민 → 노무법인 → 사업주 → 중간관리자 → 근로자** 5단계 권한이 존재합니다. 같은 화면이라도 사용자 레벨에 따라 보이는 데이터, 사용 가능한 기능, 네비게이션 구조가 모두 달라야 했습니다.

          #### 문제점

          - 권한 분기 로직이 컴포넌트 내부 곳곳에 산재 — 새로운 페이지 개발 시 권한 체크를 빠뜨리기 쉬운 구조
          - 새로운 권한 레벨 추가 시, 기존 모든 페이지를 검토하여 권한 분기를 추가해야 하는 높은 변경 비용
          - 프론트엔드에서만 권한을 제어하면 API를 직접 호출하여 데이터에 접근할 수 있는 보안 취약점 존재

          #### 개선 사항

          - **권한 제어 컴포넌트**와 **권한 확인 훅**을 구현하여 선언적으로 권한 기반 렌더링 — 조건부 로직을 컴포넌트 외부로 추출
          - 라우트 레벨에서 **권한 가드 미들웨어** 적용 — 접근 불가 페이지는 자동 리디렉션
          - 백엔드의 **Policy/Gate 패턴**과 연동하여 API 레벨에서도 권한 검증 보장
          - 이 아키텍처 위에 **노무법인 시스템 전체**를 신규 개발: 대시보드, 부관리자 관리, 기본정보 관리, 계정 찾기, 근로자 정보 관리, 사업장 검색

          #### 적용 결과

          - 권한 관련 코드의 **중앙 집중화**로, 노무법인 전체 시스템(6개 모듈)을 기존 프로젝트에 안정적으로 추가 완료
          - 신규 권한 레벨 추가 시 권한 제어 컴포넌트 설정만 변경하면 되어 **영향 범위 최소화**
          - API + 프론트 이중 권한 검증으로 데이터 접근 보안 확보
      - title: CI/CD 파이프라인 및 개발 환경 최적화
        tags:
          - general
        content: |
          #### 이슈 사항

          프로젝트 규모가 커지면서 CI 실행 시간이 지속적으로 증가했고, PR을 올린 후 CI 결과를 기다리는 시간이 길어져 개발 피드백 루프가 느려졌습니다.

          #### 문제점

          - GitHub-hosted runner의 네트워크/디스크 성능 제한으로, 매 실행마다 전체 의존성을 다운로드
          - 테스트와 빌드가 직렬 실행되어 전체 CI 시간이 각 단계의 합산
          - Node.js 버전이 오래되어 빌드 성능이 최적화되지 않은 상태

          #### 개선 사항

          - **Self-hosted runner** 도입으로 빌드 환경을 직접 관리, 이후 **ARC(Actions Runner Controller)**로 업그레이드하여 Kubernetes 기반 러너 관리로 전환
          - CI를 **Frontend·Backend lint·정적 분석 3단계 병렬 실행** 구조로 재설계하고, 동일 브랜치 중복 실행 방지
          - **Husky + lint-staged** 도입으로 커밋 전 파일 타입별 자동 검사 — TypeScript는 ESLint + Prettier, PHP는 Rector + PHPStan 정적 분석
          - **Node.js 20** 업그레이드로 V8 엔진 개선에 따른 빌드 성능 향상

          #### 적용 결과

          - ARC 전환 + 3단계 병렬 실행으로 **CI 대기 시간 단축**, 중복 실행 방지로 비용 절감
          - 커밋 전 자동 검사로 CI에서 발견되던 스타일·타입 오류가 **로컬에서 사전 차단**
          - Node.js 20 업그레이드를 통해 빌드 최적화
      - title: React Native + WebView 크로스 플랫폼 모바일 앱 개발
        tags:
          - general
        content: |
          #### 이슈 사항

          출근노트의 모바일 사용자 비율이 증가하면서, 웹 서비스를 모바일 앱으로 제공해야 했습니다. React Native + WebView 하이브리드 구조를 선택했으나, iOS와 Android 간 플랫폼 차이가 개발의 핵심 난관이었습니다.

          #### 문제점

          - 동일한 기능이라도 iOS와 Android에서 **사용하는 라이브러리가 다르거나, 한쪽 플랫폼에서 지원하지 않는** 경우가 빈번
          - WebView 동작이 플랫폼별로 상이 — iOS WKWebView와 Android WebView의 쿠키/세션 처리, JavaScript 브릿지, 스크롤 동작 등이 각각 다른 구현을 요구
          - 푸시 알림, 딥링크, 파일 다운로드 등 네이티브 연동 기능에서 iOS/Android 각각의 구현 방식과 제약사항이 달라 **하나의 코드로 통합하기 어려운 구조**

          #### 개선 사항

          - **React Native + WebView** 하이브리드 구조로 기존 웹 코드를 최대한 재활용하면서 네이티브 앱 형태로 제공
          - 플랫폼별 분기가 필요한 코드를 **Platform.OS 기반 추상화 레이어**로 격리 — 비즈니스 로직은 공유하되 네이티브 연동부만 분리
          - iOS/Android 각각의 WebView 특성에 맞춘 세션 관리, 쿠키 동기화, 하드웨어 가속 설정 등 **플랫폼별 최적화** 적용
          - 반응형 레이아웃으로 다양한 디바이스 해상도 대응

          #### 적용 결과

          - 단일 코드베이스로 웹 + Android + iOS **3개 플랫폼 서비스** — 유지보수 비용 최소화
          - Android/iOS 스토어 배포 및 운영 완료
          - 플랫폼 추상화로 신규 네이티브 기능 추가 시 **양 플랫폼 동시 대응** 가능
      - title: React 기반 신규 프로젝트 기술 스택 선정 및 아키텍처 구축
        tags:
          - toss
        content: |
          #### 이슈 사항

          입사 당시 회사의 기존 프로젝트들은 jQuery 기반이었습니다. 출근노트는 새로 시작하는 프로젝트였기 때문에, 기술 스택을 직접 선정할 기회가 있었습니다.

          #### 문제점

          - 기존 jQuery 기반 프로젝트들에서 DOM 직접 조작으로 인한 상태 불일치, UI 재사용 불가 등의 한계를 경험
          - 신규 프로젝트에서 같은 문제를 반복하지 않기 위해 모던 프론트엔드 스택 도입이 필요

          #### 개선 사항

          - 신규 프로젝트에 **React 도입을 건의**하고, 처음부터 컴포넌트 기반 UI 개발 체계로 시작
          - 이후 프로젝트 성장에 맞춰 Emotion → Chakra UI → Jotai/Zustand/React Query 등 단계적으로 모던 스택 확장

          #### 적용 결과

          - 컴포넌트 재사용과 상태 관리를 처음부터 적용하여 **4년간 안정적으로 확장 가능한 프론트엔드 기반** 확보
          - 이 아키텍처가 디자인 시스템(1-1), 성능 최적화(1-2), 권한 체계(1-3) 등 모든 개선의 기반이 됨
