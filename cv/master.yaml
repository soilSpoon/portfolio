    details:
      - title: 멀티 프로토콜 수집기의 플러그인 아키텍처 설계
        tags:
          - general
        content: |
          #### 이슈 사항

          다양한 하드웨어 장비에서 SNMP, ICMP, SSH 등 서로 다른 프로토콜로 상태 데이터를 수집해야 했습니다. 고객사마다 모니터링 대상 장비, 대시보드 레이아웃, 알림 조건이 모두 달랐습니다.

          #### 문제점

          - 프로토콜별로 수집 로직이 분산되어 있어, 새로운 프로토콜 추가 시 전 과정을 처음부터 구현해야 함
          - 고객사별 커스터마이징 요청이 들어올 때마다 코드를 직접 수정하여 배포해야 하는 구조

          #### 개선 사항

          - SNMP·ICMP·SSH 각 수집기를 **공통 인터페이스로 추상화**하여 플러그인 구조로 설계 — 새로운 프로토콜은 인터페이스만 구현하면 추가 가능
          - 고객사별 **대시보드 레이아웃과 알림 규칙을 설정 파일로 분리** — 코드 수정 없이 설정만으로 커스터마이징 대응

          #### 적용 결과

          - 신규 프로토콜 추가 시 **플러그인 구현만으로 대응** — 기존 코드 변경 불필요
          - 고객사 커스터마이징을 **설정 파일 수정만으로 처리** — 배포 없이 현장 대응 가능
