  - slug: oss
    title: 오픈소스 기여
    start: '2020'
    end: 현재
    org: 오픈소스
    tags:
      - general
      - toss
    details:
      - title: webpack 내부 수정으로 React Fast Refresh 구현 — laravel-mix 12 PRs merged
        tags:
          - general
          - toss
        content: |
          #### 이슈 사항

          출근노트 프로젝트의 Laravel Mix 환경에서 코드 변경마다 전체 페이지 새로고침. 폼 상태가 매번 초기화되어 개발 생산성 크게 저하. workaround는 라이브러리 업데이트 시 다시 깨지는 근본 해결 불가 상태

          #### 개선 사항

          라이브러리 소스를 직접 분석하여 근본 원인 파악 후 수정사항 제출:

          - laravel-mix/laravel-mix (5.2k stars)에 12개 PR merged:
            - [#2661](https://github.com/laravel-mix/laravel-mix/pull/2661) React Fast Refresh 기능 추가 (+48/-3)
            - [#2660](https://github.com/laravel-mix/laravel-mix/pull/2660) webpack-dev-server 4.0 마이그레이션
            - [#2783](https://github.com/laravel-mix/laravel-mix/pull/2783) HMR HTTPS 옵션 복구
            - [#2797](https://github.com/laravel-mix/laravel-mix/pull/2797) BabelConfig 최상위 레벨 최적화 (+305/-121, 12파일) — babel config 직접 지정 옵션 + merge 순서 수정
            - [#2809](https://github.com/laravel-mix/laravel-mix/pull/2809) React Fast Refresh overlay 버그 수정
          - react-refresh-webpack-plugin (3.2k stars)에 3개 PR merged: type-fest 호환성, wds 버전 업데이트

          #### 적용 결과

          - 코드 변경 시 폼 상태가 유지된 채 컴포넌트만 교체 — **개발 생산성 향상**
          - laravel-mix 전체 사용자에게 React Fast Refresh 기능 제공
      - title: CLIProxyAPI 메인테이너 — Claude/Gemini 프록시 안정성 확보
        tags:
          - general
          - toss
        content: |
          #### 이슈 사항

          CLIProxyAPI (18.8k stars)는 Gemini↔Claude API 호환 프록시로, Claude thinking 모델의 멀티턴 대화 시 시그니처 처리와 Gemini API의 비호환 x-* 확장 필드 문제 존재

          #### 개선 사항

          - 5개 PR merged, 30+ 포크 파생:
            - [#611](https://github.com/router-for-me/CLIProxyAPI/pull/611) Claude thinking 모델 시그니처 캐싱 + 도구 호출 안정화 (+2,162/-80)
            - [#575](https://github.com/router-for-me/CLIProxyAPI/pull/575) Gemini↔Claude JSON 스키마 호환성 — x-* 확장 필드 자동 정리 유틸리티 (+927/-24)
            - [#1311](https://github.com/router-for-me/CLIProxyAPI/pull/1311) 비호환 확장 필드 제거 (+172/-0)
            - [#605](https://github.com/router-for-me/CLIProxyAPI/pull/605) Amp 클라이언트 호환성 — thinking+tool_use 동시 렌더링 이슈 해결
            - [#1522](https://github.com/router-for-me/CLIProxyAPI/pull/1522) 프록시 에러 핸들링 개선 — 클라이언트 취소 시 불필요한 에러 로그 제거

          #### 적용 결과

          - Claude/Gemini/Codex 간 **프록시 안정성 확보**
          - **30+ 포크**가 파생될 정도로 생태계 기여
      - title: Goose AI 에이전트 — 로컬 추론 의존성 분리로 ~200MB 빌드 절감
        tags:
          - general
          - toss
        content: |
          #### 이슈 사항

          block/goose (33.5k stars)는 Block(Square) 사의 AI 코딩 에이전트. 클라우드 프로바이더만 필요한 경우에도 candle, llama-cpp-2 등 로컬 추론 의존성이 함께 빌드되어 컴파일 비용 과도

          #### 개선 사항

          - [#7976](https://github.com/block/goose/pull/7976) merged (+372/-100) — local-inference Cargo feature flag 도입
          - candle, llama-cpp-2, symphonia, rubato, tokenizers 등 로컬 추론 의존성을 선택적으로 제외 가능하게 변경

          #### 적용 결과

          - 클라우드 프로바이더만 필요한 다운스트림에서 **~200MB+ 빌드 비용 절감**
      - title: 프론트엔드 인프라 및 프레임워크 기여 — Astro, Tremor, SWC, laravel/framework 등
        tags:
          - general
          - toss
        content: |
          #### 개선 사항

          - Astro (57.7k stars): [#7729](https://github.com/withastro/astro/pull/7729) Vercel 어댑터에 정적 에셋 캐시 헤더 추가 (+144/-3) — CDN 캐싱 성능 개선
          - Tremor (16.5k stars): [#410](https://github.com/tremorlabs/tremor-npm/pull/410) 차트에 null 값 구간 연결 옵션(connectNulls) 추가 (+88/-3)
          - QuickRecorder (8.1k stars): [#102](https://github.com/lihaoyun6/QuickRecorder/pull/102) 윈도우 조회 로직을 ScreenCaptureKit API로 리팩토링 — deprecated CGWindow API 전환
          - vite-plugin-checker (1.2k stars): [#188](https://github.com/fi3ework/vite-plugin-checker/pull/188) 소켓 URL 해석 로직 수정 — Laravel Vite 환경 WebSocket 버그 수정
          - twin.macro (8.0k stars): [#200](https://github.com/ben-rogerson/twin.macro/pull/200) transform-gpu, transform-none 유틸리티 추가 (+41/-7)
          - laravel/framework (34.6k stars): [#35480](https://github.com/laravel/framework/pull/35480) PHPUnit 9 deprecated API 리팩토링
          - SWC, Jotai, Valtio, Snowpack, webpack/less-loader 등 지속 기여
          - Rust 한국어 번역, NAVER FE News, Laravel 한국어 매뉴얼 등 한국어 오픈소스 기여
